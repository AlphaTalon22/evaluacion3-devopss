spring.application.name=Springboot-API-REST

server.port=8081
spring.web.allow-cors=true

# =========================
# CONFIG MYSQL EN DOCKER
# =========================
spring.datasource.url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:${MYSQL_ROOT_PASSWORD}}
spring.datasource.platform=mysql

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# SWAGGER
# =========================
springdoc.swagger-ui.path=/swagger-ui.html