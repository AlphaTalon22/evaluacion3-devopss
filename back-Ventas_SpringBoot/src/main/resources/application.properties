spring.application.name=Springboot-API-REST-Ventas

server.port=8080
spring.web.allow-cors=true

# =========================
# CONFIG MYSQL EN DOCKER / K8S
# =========================
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/${MYSQL_DATABASE:eval2db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:password}}
spring.datasource.platform=mysql

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# SWAGGER
# =========================
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# ACTUATOR (health checks para K8s)
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
