services:

  # 1. Base de datos MySQL unica para el proyecto
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - data_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - red-interna

  # 2. Microservicio de Ventas (puerto 8080)
  back-ventas:
    build: ./back-Ventas_SpringBoot
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - red-interna 

  # 3. Microservicio de Despachos (puerto 8081)
  back-despachos:
    build: ./back-Despachos_SpringBoot
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - red-interna

  # 4. Frontend React (unico accesible desde internet)
  frontend:
    build: ./front_despacho
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despachos
    networks:
      - red-interna

volumes:
  data_db:

networks:
  red-interna:
    driver: bridge
