# ============================================================
# IMPORTANTE - Gestión de Secrets en Kubernetes
# ============================================================
# Este archivo NO debe contener valores reales de contraseñas.
# El secret se crea manualmente en el clúster ANTES del primer deploy
# con el siguiente comando:
#
#   kubectl create secret generic eval2-secret \
#     --from-literal=MYSQL_ROOT_PASSWORD=<TuPasswordSegura> \
#     --from-literal=DB_PASSWORD=<TuPasswordSegura> \
#     -n eval2
#
# Las credenciales reales se configuran en GitHub Secrets
# (Settings → Secrets → Actions) y el pipeline las inyecta
# al momento del despliegue.
#
# NUNCA commitear contraseñas reales en este archivo.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: eval2-secret
  namespace: eval2
type: Opaque
# Los valores se crean con kubectl create secret (ver instrucciones arriba)
# Este archivo queda como plantilla de referencia estructural.
data: {}
