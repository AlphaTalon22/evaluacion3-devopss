########################################
# Deployment frontend (React + Nginx)
########################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eval2
  labels:
    app: frontend
spec:
  replicas: 2          # Alta disponibilidad: 2 réplicas
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deploy
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # La imagen se actualiza automáticamente por el pipeline CI/CD
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/eval2-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
########################################
# Service frontend (LoadBalancer = IP pública AWS)
########################################
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eval2
  labels:
    app: frontend
  annotations:
    # Crea un Classic Load Balancer en AWS automáticamente
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  # LoadBalancer provisiona un ELB en AWS con IP/hostname público
  type: LoadBalancer
